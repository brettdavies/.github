# Reusable CI workflow for brettdavies Rust CLI tools.
# Runs formatting, linting, tests, security audit, and package check.
#
# Caller example:
#   jobs:
#     ci:
#       uses: brettdavies/.github/.github/workflows/rust-ci.yml@main
#
# Required caller permissions: contents: read, pull-requests: read
name: Rust CI

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Fmt, clippy, test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Tests
        run: cargo test

  audit:
    name: Security audit
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        checks: [advisories, "bans licenses sources"]
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check ${{ matrix.checks }}

  package-check:
    name: Package check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: List package contents
        run: cargo package --list

      - name: Dry-run publish
        run: cargo publish --dry-run

  changelog-check:
    name: Changelog
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: read
    steps:
      - name: Check CHANGELOG.md was updated
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const changed = files.map(f => f.filename);
            if (!changed.includes('CHANGELOG.md')) {
              core.setFailed(
                'CHANGELOG.md was not updated in this PR.\n' +
                'Run: ~/.claude/skills/rust-tool-release/scripts/generate-changelog.sh\n' +
                'Then commit the result.'
              );
            } else {
              core.info('CHANGELOG.md updated. OK.');
            }
