# Reusable release workflow for brettdavies Rust CLI tools.
# Builds cross-platform binaries, publishes to crates.io, creates draft GitHub
# Release, and dispatches Homebrew formula update.
#
# Caller example:
#   jobs:
#     pipeline:
#       uses: brettdavies/.github/.github/workflows/rust-release.yml@main
#       with:
#         crate: bird
#         bin: bird
#       secrets:
#         CI_RELEASE_TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
#
# Required caller permissions: contents: write, id-token: write
name: Rust Release

on:
  workflow_call:
    inputs:
      crate:
        description: "Crate name (e.g., bird, xurl-rs)"
        type: string
        required: true
      bin:
        description: "Binary name (e.g., bird, xr)"
        type: string
        required: true
    secrets:
      CI_RELEASE_TOKEN:
        description: "Fine-grained PAT with contents:write for release automation (Homebrew dispatch, changelog, rulesets)"
        required: true

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-inputs:
    name: Validate inputs
    runs-on: ubuntu-22.04
    steps:
      - name: Validate crate and bin names
        env:
          CRATE: ${{ inputs.crate }}
          BIN: ${{ inputs.bin }}
        run: |
          if [[ ! "$CRATE" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid crate name: $CRATE"
            exit 1
          fi
          if [[ ! "$BIN" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid binary name: $BIN"
            exit 1
          fi

  check-version:
    needs: validate-inputs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo pkgid | sed 's/.*#//')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${CARGO_VERSION}"
            exit 1
          fi

  audit:
    needs: validate-inputs
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        checks: [advisories, "bans licenses sources"]
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check ${{ matrix.checks }}

  build:
    needs: [check-version, audit]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cross --version 0.2.5 --no-confirm --force

      - name: Determine binary name
        id: binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ inputs.bin }}
        run: |
          if [[ "$TARGET" == *windows* ]]; then
            echo "name=${BIN}.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=${BIN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          BUILD_CMD="cargo"
          if [ "$USE_CROSS" = "true" ]; then
            BUILD_CMD="cross"
          fi
          $BUILD_CMD build --release --locked --target "$TARGET"

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ inputs.bin }}
        run: |
          codesign --force --sign - "target/${TARGET}/release/${BIN}"
          codesign --verify --verbose "target/${TARGET}/release/${BIN}"

      - name: Create archive
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          CRATE: ${{ inputs.crate }}
          BINARY: ${{ steps.binary.outputs.name }}
        run: |
          STAGING="${CRATE}-${TARGET}"
          mkdir -p "$STAGING"
          cp "target/${TARGET}/release/${BINARY}" "$STAGING/"
          cp LICENSE-MIT LICENSE-APACHE README.md "$STAGING/"
          cp -r completions "$STAGING/"
          if [[ "$TARGET" == *windows* ]]; then
            7z a "${STAGING}.zip" "$STAGING"
          else
            tar czf "${STAGING}.tar.gz" "$STAGING"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.crate }}-${{ matrix.target }}
          path: ${{ inputs.crate }}-${{ matrix.target }}.*

  publish-crate:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1.0.3

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}

  release:
    needs: [build, publish-crate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract the latest version section (between first and second ## headers)
          NOTES=$(awk '/^## \[/{if(n++)exit}n' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No release notes found in CHANGELOG.md"
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "content<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release assets and checksums
        env:
          CRATE: ${{ inputs.crate }}
        run: |
          mkdir -p release
          for dir in "artifacts/${CRATE}-"*; do
            [ ! -d "$dir" ] && continue
            cp "$dir"/*.tar.gz "$dir"/*.zip release/ 2>/dev/null || true
          done
          cd release
          if [ -z "$(ls -A)" ]; then
            echo "::error::No release artifacts found"
            exit 1
          fi
          sha256sum ./* > sha256sum.txt
          ls -la

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: release/*
          body: ${{ steps.changelog.outputs.content }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - name: Dispatch Homebrew formula update
        env:
          GH_TOKEN: ${{ secrets.CI_RELEASE_TOKEN }}
          VERSION: ${{ github.ref_name }}
          CRATE: ${{ inputs.crate }}
          REPO: ${{ github.repository }}
        run: |
          gh api repos/brettdavies/homebrew-tap/dispatches \
            --method POST \
            -f event_type=update-formula \
            -f "client_payload[formula]=${CRATE}" \
            -f "client_payload[version]=${VERSION#v}" \
            -f "client_payload[repo]=${REPO}"
