# Reusable workflow to verify commits in PRs to main came from dev PRs.
# Checks that every non-exempt commit has a (#N) PR reference in its message,
# indicating it was squash-merged from a feature PR to dev.
#
# Skipped for release/* branches — cherry-picks from dev inherently lose PR
# references, and the release PR itself is the review gate.
#
# Exempt prefixes: docs:, chore:, ci:, style:, build: (housekeeping commits
# authored directly on the release branch: version bumps, changelogs, CI tweaks).
# test: is NOT exempt — tests are code and must go through PRs.
#
# Caller example:
#   jobs:
#     guard-provenance:
#       uses: brettdavies/.github/.github/workflows/guard-main-provenance.yml@main
#
# Required caller permissions: pull-requests: read
name: Guard main commit provenance

on:
  workflow_call:

permissions:
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-provenance:
    runs-on: ubuntu-22.04
    steps:
      - name: Verify commits have PR references
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Skip for release branches — cherry-picks lose PR references by design
            const headRef = context.payload.pull_request.head.ref;
            if (/^release\//.test(headRef)) {
              core.info(`Skipping provenance check for release branch: ${headRef}`);
              return;
            }

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const exempt = /^(docs|chore|ci|style|build)(\(.+\))?:/i;
            const prRef = /\(#\d+\)/;

            const violations = commits
              .map(c => c.commit.message.split('\n')[0])
              .filter(msg => !exempt.test(msg) && !prRef.test(msg));

            if (violations.length > 0) {
              core.setFailed(
                `Commits must come from PRs to dev (squash commits include (#N) references).\n` +
                `The following commits have no PR reference and are not exempt:\n` +
                violations.map(m => `  - ${m}`).join('\n') + '\n\n' +
                `Exempt prefixes: docs:, chore:, ci:, style:, build:\n` +
                `Fix: use feature PRs to dev instead of committing directly to the release branch.`
              );
            } else {
              core.info(`All ${commits.length} commit(s) have PR references or are exempt. OK.`);
            }
